<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixoBoard | Advanced PVC/WPC Solutions</title>

    <!-- Google Fonts: Inter for body, Plus Jakarta Sans for headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 
      BRAND CONFIG — single source of truth for client colors.
      To change brand colors later, only edit here.
    -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "brand-red": "#DC2626",
              "brand-red-dark": "#B91C1C",
              "brand-blue": "#1D4ED8",
              "brand-blue-dark": "#1E3A8A",
              "brand-dark": "#0F172A",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Plus Jakarta Sans", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* Headings use the display font automatically */
      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Plus Jakarta Sans", sans-serif;
      }

      body {
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Mega menu subtle gradient */
      .mega-menu-gradient {
        background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
